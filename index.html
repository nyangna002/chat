<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대화 캡처 편집기</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --panel-bg: #2a2a35;
            --text-color: #ffffff;
            --accent-color: #4f46e5;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; margin-top: 0; font-size: 1.8rem; }
        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 12px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label { font-size: 0.9rem; font-weight: bold; color: #ccc; }
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }
        input[type="range"] { width: 100%; }
        input[type="file"] {
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .preview-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 20px;
            background: #111;
            overflow: auto;
        }
        canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-download {
            display: block;
            width: 100%;
            text-align: center;
            background: var(--accent-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            text-decoration: none;
        }
        .btn-download:hover { background: #4338ca; }
    </style>
</head>
<body>

<div class="container">
    <h1>💬 대화 캡처 여백 & 색상 조절기</h1>
    
    <div class="control-panel">
        <div class="control-group">
            <label>1. 이미지 업로드</label>
            <input type="file" id="upload" accept="image/*">
        </div>
        <div class="control-group">
            <label>2. 주변 마진 (px)</label>
            <input type="range" id="margin" min="10" max="150" value="50">
            <span id="margin-val" style="text-align:right; font-size:0.8rem;">50px</span>
        </div>
        <div class="control-group">
            <label>3. 변경할 배경색</label>
            <input type="color" id="bgColor" value="#ffffff">
        </div>
        <div class="control-group">
