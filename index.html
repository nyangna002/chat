<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Chat Color Customizer</title>
    <style>
        :root { --bg: #14141b; --panel: #1f1f2e; --text: #ffffff; --sub: #8f8fa3; --accent: #4f46e5; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.8rem; margin-bottom: 5px; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { color: var(--sub); font-size: 0.95rem; margin-bottom: 25px; text-align: center; }
        .wrapper { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 850px) { .wrapper { grid-template-columns: 1fr; } }
        
        .panel { background: var(--panel); padding: 25px; border-radius: 16px; display: flex; flex-direction: column; gap: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .section-title { font-size: 1rem; font-weight: 700; color: #fff; border-left: 4px solid var(--accent); padding-left: 8px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center;}
        
        .upload-btn { background: #ffffff; color: #000000; padding: 14px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; display: block; transition: background 0.2s; }
        .upload-btn:hover { background: #e5e5e5; }
        input[type="file"] { display: none; }
        
        .ctrl-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; }
        label { font-size: 0.9rem; color: var(--sub); font-weight: 500; }
        
        input[type="color"] { border: none; width: 32px; height: 32px; cursor: pointer; background: none; -webkit-appearance: none; }
        input[type="color"]::-webkit-color-swatch { border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); }
        input[type="range"] { width: 55%; accent-color: var(--accent); }
        
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .3s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        .preview-container { background: #0b0b0f; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 450px; border: 2px dashed #2a2a3a; position: relative; }
        
        .canvas-wrapper { position: relative; display: none; max-width: 100%; max-height: 65vh; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        canvas { display: block; max-width: 100%; max-height: 65vh; object-fit: contain; }
        
        #profileMarker { position: absolute; border: 2px dashed #ff5500; background: rgba(255, 85, 0, 0.2); border-radius: 50%; display: none; cursor: move; z-index: 10; box-sizing: border-box; }
        
        .placeholder { color: var(--sub); text-align: center; font-size: 0.95rem; line-height: 1.5; }
        
        .dl-btn { background: var(--accent); color: white; padding: 16px; border-radius: 12px; text-align: center; text-decoration: none; font-weight: bold; margin-top: 15px; width: 100%; display: none; box-sizing: border-box; font-size: 1.05rem; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .dl-btn:hover { background: #6366f1; }
    </style>
</head>
<body>

<h1>💬 Seamless Chat Customizer</h1>
<div class="subtitle">얼룩덜룩함 제로! 포토샵 블렌딩 기법으로 다크모드 색상을 균일하게 입힙니다.</div>

<div class="wrapper">
    <div class="panel">
        <label for="imageLoader" class="upload-btn">📁 대화 캡처 이미지 업로드</label>
        <input type="file" id="imageLoader" accept="image/*">
        
        <div class="section-title">정사각형 & 여백 설정</div>
        <div class="ctrl-row">
            <label>최소 추가 외곽 마진</label>
            <input type="range" id="marginRange" min="0" max="200" value="60">
        </div>
        <div class="ctrl-row">
            <label>외부 정사각형 배경색</label>
            <input type="color" id="outerBg" value="#000000">
        </div>

        <div class="section-title">
            <span>프로필 가림막 사용</span>
            <label class="switch">
                <input type="checkbox" id="useProfileMask" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div id="profileControls">
            <div class="ctrl-row" style="margin-bottom: 10px;">
                <label>가림막 크기</label>
                <input type="range" id="profileSize" min = "20" max="150" value="65">
            </div>
            <div class="ctrl-row">
                <label>가림막 색상</label>
                <input type="color" id="profileColor" value="#000000">
            </div>
        </div>

        <div class="section-title">전체 톤 틴트 (Tint) 필터 설정</div>
        <div class="ctrl-row">
            <label>대화창 오버레이 색상</label>
            <input type="color" id="tintColor" value="#ff0000">
        </div>
        <div class="ctrl-row">
            <label>색상 강도 조절 (블렌딩)</label>
            <input type="range" id="tintIntensity" min="1" max="100" value="80">
        </div>
    </div>

    <div>
        <div class="preview-container">
            <div class="placeholder" id="placeholder">이미지를 업로드하면 얼룩 없는<br>1:1 정사각형 결과물이 표시됩니다.</div>
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="imageCanvas"></canvas>
                <div id="profileMarker"></div>
            </div>
        </div>
        <a id="downloadLink" class="dl-btn">✨ 깔끔한 고화질 이미지 다운로드</a>
    </div>
</div>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    const placeholder = document.getElementById('placeholder');
    const downloadLink = document.getElementById('downloadLink');
    
    const marker = document.getElementById('profileMarker');
    const useProfileMask = document.getElementById('useProfileMask');
    const profileControls = document.getElementById('profileControls');
    const profileSizeInput = document.getElementById('profileSize');

    let originalImg = null;
    let isDragging = false;
    let startX, startY;
    
    let markerPctX = 0.15;
    let markerPctY = 0.28;

    imageLoader.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            originalImg = new Image();
            originalImg.crossOrigin = "anonymous"; 
            originalImg.onload = () => {
                placeholder.style.display = 'none';
                canvasWrapper.style.display = 'block';
                downloadLink.style.display = 'block';
                
                toggleMaskUI();
                draw();
            };
            originalImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    const controls = ['marginRange', 'outerBg', 'tintColor', 'tintIntensity', 'profileColor'];
    controls.forEach(id => document.getElementById(id).addEventListener('input', draw));
    profileSizeInput.addEventListener('input', () => { updateMarkerSize(); draw(); });
    useProfileMask.addEventListener('change', () => { toggleMaskUI(); draw(); });

    function toggleMaskUI() {
        if (useProfileMask.checked) {
            profileControls.style.opacity = "1";
            profileControls.style.pointerEvents = "auto";
            marker.style.display = 'block';
            updateMarkerSize();
        } else {
            profileControls.style.opacity = "0.3";
            profileControls.style.pointerEvents = "none";
            marker.style.display = 'none';
        }
    }

    function updateMarkerSize() {
        if (!originalImg) return;
        const size = profileSizeInput.value;
        marker.style.width = size + 'px';
        marker.style.height = size + 'px';
        
        const rect = canvasWrapper.getBoundingClientRect();
        marker.style.left = (rect.width * markerPctX - size/2) + 'px';
        marker.style.top = (rect.height * markerPctY - size/2) + 'px';
    }

    // 드래그 로직 
    marker.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.clientX - marker.offsetLeft;
        startY = e.clientY - marker.offsetTop;
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const rect = canvasWrapper.getBoundingClientRect();
        let newLeft = e.clientX - startX;
        let newTop = e.clientY - startY;
        marker.style.left = newLeft + 'px';
        marker.style.top = newTop + 'px';
        markerPctX = (newLeft + marker.offsetWidth / 2) / rect.width;
        markerPctY = (newTop + marker.offsetHeight / 2) / rect.height;
        draw();
    });

    document.addEventListener('mouseup', () => { isDragging = false; });

    // 모바일 터치
    marker.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        startX = touch.clientX - marker.offsetLeft;
        startY = touch.clientY - marker.offsetTop;
    });
    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const rect = canvasWrapper.getBoundingClientRect();
        const touch = e.touches[0];
        let newLeft = touch.clientX - startX;
        let newTop = touch.clientY - startY;
        marker.style.left = newLeft + 'px';
        marker.style.top = newTop + 'px';
        markerPctX = (newLeft + marker.offsetWidth / 2) / rect.width;
        markerPctY = (newTop + marker.offsetHeight / 2) / rect.height;
        draw();
    });
    document.addEventListener('touchend', () => { isDragging = false; });

    function draw() {
        if (!originalImg) return;

        const margin = parseInt(document.getElementById('marginRange').value);
        const oBgHex = document.getElementById('outerBg').value;
        const tintColor = document.getElementById('tintColor').value;
        const intensity = parseInt(document.getElementById('tintIntensity').value) / 100;
        const pColorHex = document.getElementById('profileColor').value;
        const isMaskActive = useProfileMask.checked;

        const srcW = originalImg.width;
        const srcH = originalImg.height;
        
        const squareSize = Math.max(srcW, srcH) + (margin * 2);
        canvas.width = squareSize;
        canvas.height = squareSize;

        // 1. 외부 기본 배경 도포
        ctx.fillStyle = oBgHex;
        ctx.fillRect(0, 0, squareSize, squareSize);

        const offsetX = (squareSize - srcW) / 2;
        const offsetY = (squareSize - srcH) / 2;

        // 2. 고화질 렌더링용 임시 캔버스 가공
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = srcW;
        tempCanvas.height = srcH;
        const tCtx = tempCanvas.getContext('2d');
        
        // 원본 대화 이미지 그리기
        tCtx.drawImage(originalImg, 0, 0);

        // 3. [핵심 변경] 그래픽 블렌딩 모드를 이용한 완벽한 색상 주입
        // 이 모드는 기존 말풍선 내부의 그라데이션과 픽셀 차이를 깨지 않고 '색상 톤만 고르게 변경'해 줍니다.
        tCtx.globalCompositeOperation = "color";
        tCtx.fillStyle = tintColor;
        tCtx.globalAlpha = intensity;
        tCtx.fillRect(0, 0, srcW, srcH);
        
        // 투명도 및 합성 모드 원상 복구
        tCtx.globalCompositeOperation = "source-over";
        tCtx.globalAlpha = 1.0;

        // 4. 가공된 대화창을 중앙 레이아웃에 안착
        ctx.drawImage(tempCanvas, offsetX, offsetY);

        // 5. 정확하게 정렬된 수동 프로필 가림막 얹기
        if (isMaskActive) {
            const rect = canvasWrapper.getBoundingClientRect();
            const maskCanvasX = rect.width * markerPctX * (squareSize / rect.width);
            const maskCanvasY = rect.height * markerPctY * (squareSize / rect.height);
            const maskRadius = (parseInt(profileSizeInput.value) / 2) * (squareSize / rect.width);

            ctx.fillStyle = pColorHex;
            ctx.beginPath();
            ctx.arc(maskCanvasX, maskCanvasY, maskRadius, 0, Math.PI * 2);
            ctx.fill();
        }

        // 6. 저장 경로 설정
        downloadLink.href = canvas.toDataURL('image/png');
        downloadLink.download = 'perfect_blended_chat.png';
    }

    window.addEventListener('resize', updateMarkerSize);
</script>

</body>
</html>
