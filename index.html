<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Image Customizer - Fixed</title>
    <style>
        :root { --bg: #1a1a24; --panel: #242432; --text: #fff; --sub: #a0a0b0; --accent: #4f46e5; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { max-width: 1000px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 700px) { .wrapper { grid-template-columns: 1fr; } }
        
        /* 컨트롤 패널 */
        .panel { background: var(--panel); padding: 25px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; }
        h2 { margin: 0 0 10px; font-size: 1.3rem; }
        
        .upload-btn { background: #fff; color: #000; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; display: block; }
        input[type="file"] { display: none; }
        
        .ctrl-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        label { font-size: 0.9rem; color: var(--sub); }
        .color-group { display: flex; align-items: center; gap: 10px; }
        input[type="color"] { border: none; width: 35px; height: 35px; cursor: pointer; background: none; -webkit-appearance: none; }
        input[type="color"]::-webkit-color-swatch { border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
        
        /* 프리뷰 */
        .preview-area { background: #111; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; border: 2px dashed #333; }
        canvas { max-width: 100%; max-height: 70vh; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .placeholder { color: var(--sub); text-align: center; }
        
        .dl-btn { background: var(--accent); color: white; padding: 15px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; margin-top: 20px; width: 100%; display: none; box-sizing: border-box; }
    </style>
</head>
<body>

<h1>💬 Chat Image Customizer</h1>

<div class="wrapper">
    <div class="panel">
        <h2>Controls</h2>
        
        <label for="imageLoader" class="upload-btn">1. 이미지 업로드 (클릭)</label>
        <input type="file" id="imageLoader" accept="image/*">
        
        <div class="ctrl-row">
            <label>2. 외곽 마진 (px)</label>
            <input type="range" id="marginRange" min="0" max="150" value="50" style="width: 60%">
        </div>

        <div class="ctrl-row">
            <label>3. 이미지 내부 배경/텍스트</label>
            <div class="color-group">
                <input type="color" id="chatBg" value="#ffffff">
                <input type="color" id="chatText" value="#000000">
            </div>
        </div>

        <div class="ctrl-row">
            <label>4. 외부 마진 배경색</label>
            <input type="color" id="outerBg" value="#202025">
        </div>
    </div>

    <div>
        <div class="preview-area">
            <div class="placeholder" id="placeholder">이미지를 업로드해주세요.</div>
            <canvas id="imageCanvas"></canvas>
        </div>
        <a id="downloadLink" class="dl-btn">📥 결과물 다운로드</a>
    </div>
</div>

<script>
    // 주요 엘리먼트 획득
    const imageLoader = document.getElementById('imageLoader'); // ID 수정됨
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    const placeholder = document.getElementById('placeholder');
    const downloadLink = document.getElementById('downloadLink');

    // 이미지 정보를 담을 변수
    let originalImg = null;

    // 1. 이미지 업로드 처리 (가장 중요한 부분)
    imageLoader.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            originalImg = new Image();
            originalImg.onload = () => {
                // 이미지 로드 완료 시 미리보기 활성화
                placeholder.style.display = 'none';
                canvas.style.display = 'block';
                downloadLink.style.display = 'block';
                draw(); // 그리기 함수 호출
            };
            originalImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 2. 실시간 조절 이벤트 (마진, 색상)
    const controls = ['marginRange', 'chatBg', 'chatText', 'outerBg'];
    controls.forEach(id => {
        document.getElementById(id).addEventListener('input', draw);
    });

    // 색상 헥사코드를 RGB로 변환
    function hexToRgb(hex) {
        return {
            r: parseInt(hex.slice(1, 3), 16),
            g: parseInt(hex.slice(3, 5), 16),
            b: parseInt(hex.slice(5, 7), 16)
        };
    }

    // 3. 핵심 그리기 및 변환 함수
    function draw() {
        if (!originalImg) return;

        // 컨트롤 값 읽기
        const margin = parseInt(document.getElementById('marginRange').value);
        const cBg = hexToRgb(document.getElementById('chatBg').value);
        const cText = hexToRgb(document.getElementById('chatText').value);
        const oBgHex = document.getElementById('outerBg').value;

        // 크기 계산 (원본 + 3px 테두리 + 마진)
        const srcW = originalImg.width;
        const srcH = originalImg.height;
        const borderW = srcW + 6;
        const borderH = srcH + 6;
        
        canvas.width = borderW + (margin * 2);
        canvas.height = borderH + (margin * 2);

        // A. 배경 전체 채우기 (외부 마진 색상)
        ctx.fillStyle = oBgHex;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // B. 픽셀 데이터를 조작하기 위한 임시 캔버스
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = srcW;
        tempCanvas.height = srcH;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(originalImg, 0, 0);

        const imgData = tCtx.getImageData(0, 0, srcW, srcH);
        const data = imgData.data;

        // 원본 가장자리(0,0) 색상 추출 (3px 라인용)
        const edgeR = data[0], edgeG = data[1], edgeB = data[2];

        // C. 이미지 내부 색상 반전/변경 알고리즘
        for (let i = 0; i < data.length; i += 4) {
            const brightness = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
            if (brightness < 128) { // 어두운 부분 -> 지정한 텍스트 색상
                data[i] = cText.r; data[i+1] = cText.g; data[i+2] = cText.b;
            } else { // 밝은 부분 -> 지정한 배경색
                data[i] = cBg.r; data[i+1] = cBg.g; data[i+2] = cBg.b;
            }
        }
        tCtx.putImageData(imgData, 0, 0);

        // D. 최종 합성
        // 3px 테두리 그리기
        ctx.fillStyle = `rgb(${edgeR}, ${edgeG}, ${edgeB})`;
        ctx.fillRect(margin, margin, borderW, borderH);
        
        // 테두리 안에 가공된 이미지 얹기
        ctx.drawImage(tempCanvas, margin+3, margin+3);

        // E. 다운로드 링크 업데이트
        downloadLink.href = canvas.toDataURL('image/png');
        downloadLink.download = 'edited_chat.png';
    }
</script>

</body>
</html>
