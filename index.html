<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Res Chat Screenshot Customizer</title>
    <style>
        :root { --bg: #14141b; --panel: #1f1f2e; --text: #ffffff; --sub: #8f8fa3; --accent: #4f46e5; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.8rem; margin-bottom: 25px; font-weight: 800; letter-spacing: -0.5px; }
        .wrapper { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 850px) { .wrapper { grid-template-columns: 1fr; } }
        
        .panel { background: var(--panel); padding: 25px; border-radius: 16px; display: flex; flex-direction: column; gap: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .section-title { font-size: 1rem; font-weight: 700; color: #fff; border-left: 4px solid var(--accent); padding-left: 8px; margin: 5px 0; }
        
        .upload-btn { background: #ffffff; color: #000000; padding: 14px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; display: block; transition: background 0.2s; }
        .upload-btn:hover { background: #e5e5e5; }
        input[type="file"] { display: none; }
        
        .ctrl-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; }
        label { font-size: 0.9rem; color: var(--sub); font-weight: 500; }
        
        .color-group { display: flex; align-items: center; gap: 8px; }
        input[type="color"] { border: none; width: 32px; height: 32px; cursor: pointer; background: none; -webkit-appearance: none; }
        input[type="color"]::-webkit-color-swatch { border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); }
        input[type="range"] { width: 55%; accent-color: var(--accent); }
        
        .preview-container { background: #0b0b0f; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 450px; border: 2px dashed #2a2a3a; overflow: hidden; }
        /* 미리보기 화면 크기는 제한하되 내부 해상도는 깨지지 않게 처리 */
        canvas { max-width: 100%; max-height: 65vh; object-fit: contain; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .placeholder { color: var(--sub); text-align: center; font-size: 0.95rem; line-height: 1.5; }
        
        .dl-btn { background: var(--accent); color: white; padding: 16px; border-radius: 12px; text-align: center; text-decoration: none; font-weight: bold; margin-top: 15px; width: 100%; display: none; box-sizing: border-box; font-size: 1.05rem; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .dl-btn:hover { background: #6366f1; }
    </style>
</head>
<body>

<h1>💬 Ultra-Res Chat Customizer</h1>

<div class="wrapper">
    <div class="panel">
        <label for="imageLoader" class="upload-btn">📁 대화 캡처 이미지 업로드</label>
        <input type="file" id="imageLoader" accept="image/*">
        
        <div class="section-title">여백 설정</div>
        <div class="ctrl-row">
            <label>추가 외곽 마진</label>
            <input type="range" id="marginRange" min="0" max="200" value="60">
        </div>
        <div class="ctrl-row">
            <label>외부 마진 배경색</label>
            <input type="color" id="outerBg" value="#1a1a24">
        </div>

        <div class="section-title">내부 텍스트 색상 조절</div>
        <div class="ctrl-row">
            <label>유저 이름/시간 색상 (가장 어두운 영역)</label>
            <input type="color" id="nameText" value="#111111">
        </div>
        <div class="ctrl-row">
            <label>대화 본문 본문색 (중간 어두운 영역)</label>
            <input type="color" id="chatText" value="#333333">
        </div>

        <div class="section-title">내부 배경 및 말풍선 조절</div>
        <div class="ctrl-row">
            <label>대화 말풍선 색상 (중간 밝은 영역)</label>
            <input type="color" id="bubbleBg" value="#ffeb33">
        </div>
        <div class="ctrl-row">
            <label>대화방 기본 배경색 (가장 밝은 영역)</label>
            <input type="color" id="chatBg" value="#abc1d1">
        </div>
    </div>

    <div>
        <div class="preview-container">
            <div class="placeholder" id="placeholder">왼쪽에서 고화질 캡처 이미지를 업로드하면<br>실시간 정밀 편집 미리보기가 활성화됩니다.</div>
            <canvas id="imageCanvas"></canvas>
        </div>
        <a id="downloadLink" class="dl-btn">✨ 고화질 가공 이미지 다운로드</a>
    </div>
</div>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    const placeholder = document.getElementById('placeholder');
    const downloadLink = document.getElementById('downloadLink');

    let originalImg = null;

    imageLoader.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            originalImg = new Image();
            originalImg.onload = () => {
                placeholder.style.display = 'none';
                canvas.style.display = 'block';
                downloadLink.style.display = 'block';
                draw();
            };
            originalImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 모든 조절 버튼에 이벤트 바인딩
    const controls = ['marginRange', 'outerBg', 'nameText', 'chatText', 'bubbleBg', 'chatBg'];
    controls.forEach(id => document.getElementById(id).addEventListener('input', draw));

    function hexToRgb(hex) {
        return {
            r: parseInt(hex.slice(1, 3), 16),
            g: parseInt(hex.slice(3, 5), 16),
            b: parseInt(hex.slice(5, 7), 16)
        };
    }

    function draw() {
        if (!originalImg) return;

        // 값 가져오기
        const margin = parseInt(document.getElementById('marginRange').value);
        const oBgHex = document.getElementById('outerBg').value;
        const cName = hexToRgb(document.getElementById('nameText').value);
        const cText = hexToRgb(document.getElementById('chatText').value);
        const cBubble = hexToRgb(document.getElementById('bubbleBg').value);
        const cBg = hexToRgb(document.getElementById('chatBg').value);

        // 원본 고해상도 크기 그대로 반영
        const srcW = originalImg.width;
        const srcH = originalImg.height;
        const borderW = srcW + 6;
        const borderH = srcH + 6;
        
        canvas.width = borderW + (margin * 2);
        canvas.height = borderH + (margin * 2);

        // 1. 외부 마진 영역 칠하기
        ctx.fillStyle = oBgHex;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 고화질 이미지 연산용 오프스크린 캔버스 생성
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = srcW;
        tempCanvas.height = srcH;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(originalImg, 0, 0);

        const imgData = tCtx.getImageData(0, 0, srcW, srcH);
        const data = imgData.data;

        // 3px 라인을 위한 원본 가장자리 색상 보존
        const edgeR = data[0], edgeG = data[1], edgeB = data[2];

        // 3. 4단계 명도 세분화 스캔 레이어
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            // 표준 디지털 휘도 공식
            const brightness = 0.299 * r + 0.587 * g + 0.114 * b;

            if (brightness < 75) { 
                // [레벨 1] 이름, 상단 바 텍스트 등 가장 진한 글씨 영역
                data[i] = cName.r; data[i+1] = cName.g; data[i+2] = cName.b;
            } else if (brightness >= 75 && brightness < 150) { 
                // [레벨 2] 대화 본문 텍스트 및 일반 안내 문구 영역
                data[i] = cText.r; data[i+1] = cText.g; data[i+2] = cText.b;
            } else if (brightness >= 150 && brightness < 225) { 
                // [레벨 3] 상대방/본인 말풍선 영역
                data[i] = cBubble.r; data[i+1] = cBubble.g; data[i+2] = cBubble.b;
            } else { 
                // [레벨 4] 대화방 전체 배경 영역 (가장 밝음)
                data[i] = cBg.r; data[i+1] = cBg.g; data[i+2] = cBg.b;
            }
        }
        tCtx.putImageData(imgData, 0, 0);

        // 4. 3px 원본 주변색 프레임 깔기
        ctx.fillStyle = `rgb(${edgeR}, ${edgeG}, ${edgeB})`;
        ctx.fillRect(margin, margin, borderW, borderH);
        
        // 5. 가공된 해상도 100% 픽셀 중심에 안착
        ctx.drawImage(tempCanvas, margin + 3, margin + 3);

        // 6. 다운로드 링크 생성
        downloadLink.href = canvas.toDataURL('image/png');
        downloadLink.download = 'highres_custom_chat.png';
    }
</script>

</body>
</html>
