<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Screenshot Customizer</title>
    <style>
        :root {
            --bg-main: #1a1a24;
            --bg-panel: #242432;
            --bg-input: #1e1e2a;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --accent: #4f46e5;
            --accent-hover: #6366f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 2.2rem;
            margin: 0 0 8px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--bg-panel);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0 0 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* 커스텀 파일 업로드 */
        .file-upload-btn {
            display: block;
            text-align: center;
            background: #ffffff;
            color: #000000;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-upload-btn:hover { background: #e5e5e5; }
        input[type="file"] { display: none; }

        /* 색상 피커 및 슬라이더 */
        .color-picker-wrapper {
            background: var(--bg-input);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

        .color-hex {
            font-family: monospace;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            margin: 10px 0;
        }

        .range-value {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* 우측 프리뷰 영역 */
        .preview-panel {
            background: #14141b;
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 450px;
            border: 2px dashed rgba(255,255,255,0.1);
            position: relative;
        }

        .preview-placeholder {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.95rem;
        }

        canvas {
            max-width: 100%;
            max-height: 60px; /* 초기값 */
            height: auto;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: none;
        }

        /* 다운로드 버튼 */
        .btn-download {
            display: none;
            width: 100%;
            text-align: center;
            background: var(--accent);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .btn-download:hover { background: var(--accent-hover); }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>💬 Chat Screenshot Customizer</h1>
        <p>대화 캡처의 3px 테두리를 유지한 채, 내외각 배경과 텍스트 색상을 자유롭게 조절하세요.</p>
    </header>

    <div class="main-layout">
        <div class="panel">
            <div class="control-group">
                <label>1. 이미지 가져오기</label>
                <label for="upload" class="file-upload-btn">Upload Chat Screenshot</label>
                <input type="file" id="upload" accept="image/*">
            </div>

            <div class="control-group">
                <div class="panel-title">Border & Margin</div>
                <label>Extra Margin (외부 추가 여백)</label>
                <input type="range" id="margin" min="0" max="200" value="50">
                <div class="range-value" id="margin-val">50px</div>
            </div>

            <div class="control-group">
                <div class="panel-title">Inside Chat (이미지 내부 색상)</div>
                <div class="row">
                    <div class="control-group">
                        <label>말풍선 외 배경색</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="chatBg" value="#ffffff">
                            <span class="color-hex" id="chatBg-hex">#ffffff</span>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>텍스트/말풍선색</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="chatText" value="#1a1a1a">
                            <span class="color-hex" id="chatText-hex">#1a
