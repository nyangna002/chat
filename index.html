<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth High-Res Chat Customizer</title>
    <style>
        :root { --bg: #14141b; --panel: #1f1f2e; --text: #ffffff; --sub: #8f8fa3; --accent: #4f46e5; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.8rem; margin-bottom: 25px; font-weight: 800; letter-spacing: -0.5px; }
        .wrapper { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 850px) { .wrapper { grid-template-columns: 1fr; } }
        
        .panel { background: var(--panel); padding: 25px; border-radius: 16px; display: flex; flex-direction: column; gap: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .section-title { font-size: 1rem; font-weight: 700; color: #fff; border-left: 4px solid var(--accent); padding-left: 8px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center;}
        
        .upload-btn { background: #ffffff; color: #000000; padding: 14px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; display: block; transition: background 0.2s; }
        .upload-btn:hover { background: #e5e5e5; }
        input[type="file"] { display: none; }
        
        .ctrl-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; }
        label { font-size: 0.9rem; color: var(--sub); font-weight: 500; }
        
        .color-group { display: flex; align-items: center; gap: 8px; }
        input[type="color"] { border: none; width: 32px; height: 32px; cursor: pointer; background: none; -webkit-appearance: none; }
        input[type="color"]::-webkit-color-swatch { border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); }
        input[type="range"] { width: 55%; accent-color: var(--accent); }
        
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .3s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        .preview-container { background: #0b0b0f; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 450px; border: 2px dashed #2a2a3a; overflow: hidden; }
        canvas { max-width: 100%; max-height: 65vh; object-fit: contain; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .placeholder { color: var(--sub); text-align: center; font-size: 0.95rem; line-height: 1.5; }
        
        .dl-btn { background: var(--accent); color: white; padding: 16px; border-radius: 12px; text-align: center; text-decoration: none; font-weight: bold; margin-top: 15px; width: 100%; display: none; box-sizing: border-box; font-size: 1.05rem; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .dl-btn:hover { background: #6366f1; }
    </style>
</head>
<body>

<h1>💬 Smooth Chat Customizer</h1>

<div class="wrapper">
    <div class="panel">
        <label for="imageLoader" class="upload-btn">📁 대화 캡처 이미지 업로드</label>
        <input type="file" id="imageLoader" accept="image/*">
        
        <div class="section-title">여백 설정</div>
        <div class="ctrl-row">
            <label>추가 외곽 마진</label>
            <input type="range" id="marginRange" min="0" max="200" value="60">
        </div>
        <div class="ctrl-row">
            <label>외부 마진 배경색</label>
            <input type="color" id="outerBg" value="#1a1a24">
        </div>

        <div class="section-title">
            <span>익명화 (프로필 사진 지우기)</span>
            <label class="switch">
                <input type="checkbox" id="hideProfile" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="ctrl-row">
            <label>프로필 가림막 색상</label>
            <input type="color" id="profileColor" value="#ccccdd">
        </div>

        <div class="section-title">내부 색상 커스텀 (부드러운 안티앨리어싱 보존)</div>
        <div class="ctrl-row">
            <label>글씨 및 아이콘 색상</label>
            <input type="color" id="chatText" value="#1a1a1a">
        </div>
        <div class="ctrl-row">
            <label>말풍선 색상</label>
            <input type="color" id="bubbleBg" value="#ffeb33">
        </div>
        <div class="ctrl-row">
            <label>대화창 기본 배경색</label>
            <input type="color" id="chatBg" value="#abc1d1">
        </div>
    </div>

    <div>
        <div class="preview-container">
            <div class="placeholder" id="placeholder">이미지를 업로드하면 깨짐 없는<br>매끄러운 결과물 미리보기가 표시됩니다.</div>
            <canvas id="imageCanvas"></canvas>
        </div>
        <a id="downloadLink" class="dl-btn">✨ 고화질 가공 이미지 다운로드</a>
    </div>
</div>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    const placeholder = document.getElementById('placeholder');
    const downloadLink = document.getElementById('downloadLink');

    let originalImg = null;

    imageLoader.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            originalImg = new Image();
            originalImg.onload = () => {
                placeholder.style.display = 'none';
                canvas.style.display = 'block';
                downloadLink.style.display = 'block';
                draw();
            };
            originalImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    const controls = ['marginRange', 'outerBg', 'chatText', 'bubbleBg', 'chatBg', 'hideProfile', 'profileColor'];
    controls.forEach(id => document.getElementById(id).addEventListener('input', draw));

    function hexToRgb(hex) {
        return {
            r: parseInt(hex.slice(1, 3), 16),
            g: parseInt(hex.slice(3, 5), 16),
            b: parseInt(hex.slice(5, 7), 16)
        };
    }

    function draw() {
        if (!originalImg) return;

        const margin = parseInt(document.getElementById('marginRange').value);
        const oBgHex = document.getElementById('outerBg').value;
        const cText = hexToRgb(document.getElementById('chatText').value);
        const cBubble = hexToRgb(document.getElementById('bubbleBg').value);
        const cBg = hexToRgb(document.getElementById('chatBg').value);
        const hideProfile = document.getElementById('hideProfile').checked;
        const pColorHex = document.getElementById('profileColor').value;

        const srcW = originalImg.width;
        const srcH = originalImg.height;
        const borderW = srcW + 6;
        const borderH = srcH + 6;
        
        canvas.width = borderW + (margin * 2);
        canvas.height = borderH + (margin * 2);

        // 1. 외부 마진 베이스 채우기
        ctx.fillStyle = oBgHex;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 오프스크린 가공 캔버스
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = srcW;
        tempCanvas.height = srcH;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(originalImg, 0, 0);

        // [프로필 삭제 영역]
        if (hideProfile) {
            const imgDataForDetect = tCtx.getImageData(0, 0, srcW, srcH);
            const pixels = imgDataForDetect.data;
            const startX = Math.floor(srcW * 0.02);
            const endX = Math.floor(srcW * 0.15);
            const boxWidth = endX - startX;
            let inProfileY = false;
            let profileStartY = 0;

            for (let y = Math.floor(srcH * 0.05); y < srcH - 50; y += 4) {
                let colorVariance = 0;
                let prevR = pixels[((y * srcW) + startX) * 4];
                let prevG = pixels[((y * srcW) + startX) * 4 + 1];
                let prevB = pixels[((y * srcW) + startX) * 4 + 2];

                for (let x = startX; x < endX; x += 10) {
                    const idx = ((y * srcW) + x) * 4;
                    colorVariance += Math.abs(pixels[idx] - prevR) + Math.abs(pixels[idx+1] - prevG) + Math.abs(pixels[idx+2] - prevB);
                    prevR = pixels[idx]; prevG = pixels[idx+1]; prevB = pixels[idx+2];
                }

                if (colorVariance > 180) { 
                    if (!inProfileY) { inProfileY = true; profileStartY = y; }
                } else {
                    if (inProfileY) {
                        let profileHeight = y - profileStartY;
                        if (profileHeight > boxWidth * 0.6 && profileHeight < boxWidth * 1.4) {
                            tCtx.fillStyle = pColorHex;
                            tCtx.beginPath();
                            const centerX = startX + (boxWidth / 2);
                            const centerY = profileStartY + (profileHeight / 2);
                            tCtx.arc(centerX, centerY, Math.min(boxWidth, profileHeight) / 2, 0, Math.PI * 2);
                            tCtx.fill();
                        }
                        inProfileY = false;
                    }
                }
            }
        }

        // 3. 선명도 보존형 선형 보간 블렌딩 (Linear Interpolation Blending)
        const imgData = tCtx.getImageData(0, 0, srcW, srcH);
        const data = imgData.data;
        const edgeR = data[0], edgeG = data[1], edgeB = data[2];
        const pColorRgb = hexToRgb(pColorHex);

        for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            
            if (hideProfile && r === pColorRgb.r && g === pColorRgb.g && b === pColorRgb.b) continue;

            const brightness = 0.299 * r + 0.587 * g + 0.114 * b;

            // [핵심 변경]: 칼같이 자르지 않고, 명도 비율(0~1)을 계산해 부드럽게 믹싱합니다.
            if (brightness < 130) {
                // 글자(가장 어두움) ~ 말풍선 배경 사이의 보간
                let factor = brightness / 130; 
                data[i]   = cText.r + (cBubble.r - cText.r) * factor;
                data[i+1] = cText.g + (cBubble.g - cText.g) * factor;
                data[i+2] = cText.b + (cBubble.b - cText.b) * factor;
            } else {
                // 말풍선 내부 ~ 대화방 전체 배경 사이의 보간
                let factor = (brightness - 130) / (255 - 130);
                if(factor > 1) factor = 1;
                data[i]   = cBubble.r + (cBg.r - cBubble.r) * factor;
                data[i+1] = cBubble.g + (cBg.g - cBubble.g) * factor;
                data[i+2] = cBubble.b + (cBg.b - cBubble.b) * factor;
            }
        }
        tCtx.putImageData(imgData, 0, 0);

        // 4. 최종 프레임 배치
        ctx.fillStyle = `rgb(${edgeR}, ${edgeG}, ${edgeB})`;
        ctx.fillRect(margin, margin, borderW, borderH);
        ctx.drawImage(tempCanvas, margin + 3, margin + 3);

        // 5. 링크 바인딩
        downloadLink.href = canvas.toDataURL('image/png');
        downloadLink.download = 'smooth_chat_screenshot.png';
    }
</script>

</body>
</html>
